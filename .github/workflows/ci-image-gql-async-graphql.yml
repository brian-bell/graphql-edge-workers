name: gql-async-graphql-ci-image

permissions:
  contents: read
  packages: write

on:
  push:
    paths:
      - '.github/docker/gql-async-graphql-ci/**'
      - '.github/workflows/ci-image-gql-async-graphql.yml'
  pull_request:
    paths:
      - '.github/docker/gql-async-graphql-ci/**'
      - '.github/workflows/ci-image-gql-async-graphql.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gql-async-graphql-ci
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and publish CI image
        uses: docker/build-push-action@v6
        with:
          context: .github/docker/gql-async-graphql-ci
          file: .github/docker/gql-async-graphql-ci/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
